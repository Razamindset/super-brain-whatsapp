<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Super Brain</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .dashboard-container {
            width: 95%;
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeUp 0.8s ease-out;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            margin-top: 0;
        }

        .stat-card .value {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .table-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            overflow-x: auto;
        }

        .table-container h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        td {
            color: var(--text-primary);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .msg-cell {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rsp-cell {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #a78bfa;
        }
        
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }
    </style>
</head>
<body style="display: block;">
    <div class="dashboard-container typography-focused">
        <h1>Super Brain Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Users</h3>
                <div class="value" id="stats-users">-</div>
            </div>
            <div class="stat-card">
                <h3>Interactions</h3>
                <div class="value" id="stats-convs">-</div>
            </div>
            <div class="stat-card">
                <h3>Saved Memories</h3>
                <div class="value" id="stats-memories">-</div>
            </div>
        </div>

        <div class="table-container">
            <h2>Recent Conversations</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User ID</th>
                        <th>Message</th>
                        <th>Response</th>
                    </tr>
                </thead>
                <tbody id="conv-table-body">
                    <tr><td colspan="4" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Fetch stats
        fetch('/api/admin/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('stats-users').innerText = data.users;
                document.getElementById('stats-convs').innerText = data.conversations;
                document.getElementById('stats-memories').innerText = data.memories;
            })
            .catch(err => console.error('Error fetching stats:', err));

        // Fetch conversations
        fetch('/api/admin/conversations')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('conv-table-body');
                tbody.innerHTML = '';
                
                if(!data.conversations || data.conversations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="loading">No conversations yet.</td></tr>';
                    return;
                }

                data.conversations.forEach(c => {
                    const tr = document.createElement('tr');
                    
                    const tDate = new Date(c.timestamp);
                    const timeStr = isNaN(tDate) ? c.timestamp : tDate.toLocaleString();
                    
                    tr.innerHTML = `
                        <td>${timeStr}</td>
                        <td>${c.user_id}</td>
                        <td class="msg-cell" title="${c.message}">${c.message}</td>
                        <td class="rsp-cell" title="${c.response}">${c.response}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                console.error('Error fetching conversations:', err);
                document.getElementById('conv-table-body').innerHTML = '<tr><td colspan="4" class="loading">Error loading data.</td></tr>';
            });
    </script>
</body>
</html>
